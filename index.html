<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CryptoCarouselGPT</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" 
        integrity="sha384-tViUnnbY00bLQ4R2NYMFG4LNuF69akjT+JcEoLdY/GMnaHxV+jvZJQfY5z5V4Czv" crossorigin="anonymous">
  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: rgba(26, 26, 26, 0.95);
      --card-border: #2a2a2a;
      --accent-cyan: #00f2fe;
      --accent-blue: #4facfe;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #888888;
      --error: #ff4d4d;
      --success: #00c853;
      --glass-bg: rgba(10, 10, 10, 0.7);
      --shadow-glow: 0 8px 32px rgba(0, 242, 254, 0.08);
      --border-radius-card: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 90px;
      letter-spacing: -0.2px;
      position: relative;
    }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 1030;
      background: var(--glass-bg);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--card-border);
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app-brand { display: flex; align-items: center; gap: 0.5rem; }
    .app-brand i {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .app-brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
      line-height: 1.2;
    }
    .main-container {
      max-width: 640px;
      margin: 1.5rem auto;
      padding: 0 1rem;
      flex: 1;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      animation: fadeInUp 0.6s ease;
    }
    .empty-icon {
      font-size: 4rem;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
      display: inline-block;
    }
    .empty-heading { font-weight: 700; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .empty-sub { color: var(--text-muted); margin-bottom: 2rem; }
    .pulse-arrow {
      display: inline-block;
      animation: pulse 2s infinite;
      margin-top: 1rem;
      font-size: 1.5rem;
      color: var(--accent-cyan);
    }
    @keyframes pulse {
      0% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(8px); }
      100% { opacity: 0.3; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .skeleton-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--border-radius-card);
      padding: 1.5rem;
      box-shadow: var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }
    .shimmer { position: relative; }
    .shimmer::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
      animation: shimmer 1.8s infinite;
    }
    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    .skeleton-line {
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      margin-bottom: 1rem;
      height: 1rem;
    }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }
    .skeleton-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .skeleton-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    .carousel-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--border-radius-card);
      box-shadow: var(--shadow-glow);
      overflow: hidden;
      transition: all 0.3s ease;
      animation: cardAppear 0.5s ease-out;
    }
    @keyframes cardAppear {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .card-header-bar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--card-border);
      gap: 0.5rem;
    }
    .source-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      color: #000;
    }
    .source-name {
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }
    .time-ago {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 0.5rem;
    }
    .slide-area {
      background: #121212;
      padding: 1.5rem 1rem;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .slide-container {
      display: flex;
      transition: transform 0.35s ease, opacity 0.35s ease;
      width: 100%;
    }
    .slide {
      flex: 0 0 100%;
      opacity: 0;
      transition: opacity 0.3s ease;
      padding: 0 0.5rem;
    }
    .slide.active { opacity: 1; }
    .slide-number-pill {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      margin-bottom: 0.8rem;
    }
    .slide-headline {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    .slide-body {
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .takeaway {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--accent-cyan);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 0.8rem;
      margin-top: auto;
    }
    .image-prompt-box {
      background: rgba(0,0,0,0.3);
      border: 1px dashed var(--card-border);
      border-radius: 12px;
      padding: 0.8rem;
      margin-top: 1rem;
      color: var(--text-muted);
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      animation: pulseBorder 2.5s infinite;
    }
    @keyframes pulseBorder {
      0% { border-color: rgba(0, 242, 254, 0.2); }
      50% { border-color: rgba(0, 242, 254, 0.5); }
      100% { border-color: rgba(0, 242, 254, 0.2); }
    }
    .nav-arrows {
      display: flex;
      justify-content: space-between;
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      pointer-events: none;
      padding: 0 0.5rem;
    }
    .arrow-btn {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    .arrow-btn:hover {
      background: rgba(0,242,254,0.15);
      border-color: var(--accent-cyan);
    }
    .dot-indicators {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active-dot {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      transform: scale(1.4);
      box-shadow: 0 0 8px var(--accent-cyan);
    }
    .caption-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--border-radius-card);
      padding: 1rem;
      margin-top: 1rem;
      box-shadow: var(--shadow-glow);
      position: relative;
    }
    .caption-text { color: var(--text-secondary); margin-bottom: 0.5rem; }
    .hashtags {
      color: var(--text-muted);
      font-size: 0.85rem;
      word-break: break-word;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
      border-radius: 20px;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .copy-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }
    .generate-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1020;
      width: fit-content;
    }
    .btn-generate {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(0,242,254,0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: 0.3px;
    }
    .btn-generate:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 30px rgba(0,242,254,0.5);
    }
    .btn-generate:active { transform: scale(0.97); }
    .btn-generate:disabled {
      opacity: 0.7;
      pointer-events: none;
    }
    .btn-generate.error-shake {
      animation: shake 0.4s ease;
      background: var(--error);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .toast-notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--error);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 30px;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 9999;
      animation: slideDown 0.3s ease;
      display: none;
    }
    .toast-notification.success { background: var(--success); }
    @keyframes slideDown {
      from { opacity: 0; transform: translate(-50%, -20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
    .app-footer {
      text-align: center;
      padding: 2rem 1rem 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      margin-top: 2rem;
    }
    @media (max-width: 576px) {
      .slide-headline { font-size: 1.2rem; }
      .arrow-btn { width: 30px; height: 30px; }
    }
    .swipe-area { touch-action: pan-y; }
  </style>
</head>
<body>
  <div id="liveToast" class="toast-notification" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <header class="app-header">
    <div class="app-brand">
      <i class="bi bi-collection-play-fill"></i>
      <h1>CryptoCarouselGPT</h1>
    </div>
  </header>

  <main class="main-container" id="mainContainer">
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">
        <i class="bi bi-lightning-charge-fill"></i>
      </div>
      <div class="empty-heading">Ready to create your first carousel</div>
      <p class="empty-sub">Tap Generate to fetch latest crypto news</p>
      <div class="pulse-arrow">
        <i class="bi bi-arrow-down-circle-fill"></i>
      </div>
    </div>

    <div id="loadingSkeleton" class="skeleton-card shimmer" style="display: none;">
      <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
        <div style="width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.05);"></div>
        <div style="flex:1;">
          <div class="skeleton-line short" style="width: 50%;"></div>
          <div class="skeleton-line short" style="width: 30%; height: 0.6rem;"></div>
        </div>
        <div style="width: 20px; height: 20px; background: rgba(255,255,255,0.05); border-radius: 50%;"></div>
      </div>
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
      <div class="skeleton-line medium" style="width: 90%;"></div>
      <div class="skeleton-line short" style="width: 70%;"></div>
      <div class="skeleton-dots">
        <span class="skeleton-dot"></span>
        <span class="skeleton-dot"></span>
        <span class="skeleton-dot"></span>
        <span class="skeleton-dot"></span>
        <span class="skeleton-dot"></span>
      </div>
    </div>

    <div id="contentArea"></div>
  </main>

  <div class="generate-container">
    <button id="generateBtn" class="btn btn-generate" aria-label="Generate carousel from crypto news">
      <i class="bi bi-stars"></i> Generate
    </button>
  </div>

  <footer class="app-footer">
    Built with ❤️ by CryptoCarouselGPT • Powered by CoinTelegraph via RSS2JSON
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
          crossorigin="anonymous"></script>
  <script>
    (function() {
      'use strict';

      const generateBtn = document.getElementById('generateBtn');
      const emptyState = document.getElementById('emptyState');
      const loadingSkeleton = document.getElementById('loadingSkeleton');
      const contentArea = document.getElementById('contentArea');
      const toast = document.getElementById('liveToast');

      let currentSlide = 0;
      let carouselData = null;

      function showToast(message, isSuccess = false) {
        toast.textContent = message;
        toast.className = 'toast-notification' + (isSuccess ? ' success' : '');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 4000);
      }

      function timeAgo(dateString) {
        const now = new Date();
        const past = new Date(dateString);
        const diffMs = now - past;
        const diffSec = Math.floor(diffMs / 1000);
        if (diffSec < 60) return 'just now';
        const diffMin = Math.floor(diffSec / 60);
        if (diffMin < 60) return `${diffMin}m ago`;
        const diffHr = Math.floor(diffMin / 60);
        if (diffHr < 24) return `${diffHr}h ago`;
        const diffDay = Math.floor(diffHr / 24);
        return `${diffDay}d ago`;
      }

      // ====================== FETCH REAL NEWS VIA RSS2JSON (CORS enabled, always works) ======================
      async function fetchNews() {
        // Using CoinTelegraph RSS via RSS2JSON – completely free, no key, CORS supported
        const url = 'https://api.rss2json.com/v1/api.json?rss_url=https://cointelegraph.com/rss';
        console.log('📡 Fetching news from CoinTelegraph…');
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.status !== 'ok' || !data.items) throw new Error('Invalid response from RSS2JSON');
        
        // Map RSS items to our article format
        return data.items.map(item => ({
          title: item.title,
          description: item.description.replace(/<[^>]+>/g, ''), // strip HTML
          source: { name: 'CoinTelegraph' },
          url: item.link,
          publishedAt: item.pubDate
        }));
      }

      function selectBestArticle(articles) {
        if (!articles.length) throw new Error('No articles found');
        const pumpWords = ['100x', 'moon', 'pump', 'dump', 'shill', 'moonshot', 'pumpamentals', 'shitcoin', 'gem', '1000x'];
        const educationalKeywords = ['regulation', 'upgrade', 'protocol', 'adoption', 'how-to', 'explained', 'guide', 'analysis', 'sec', 'layer2', 'defi', 'dao', 'staking', 'governance', 'partnership'];
        
        const filtered = articles.filter(article => {
          const title = (article.title || '').toLowerCase();
          return !pumpWords.some(word => title.includes(word));
        });
        
        const pool = filtered.length > 0 ? filtered : articles;
        
        const scored = pool.map(article => {
          const text = ((article.title || '') + ' ' + (article.description || '')).toLowerCase();
          let eduScore = educationalKeywords.reduce((count, kw) => text.includes(kw) ? count + 1 : count, 0);
          let lengthBonus = (article.description || '').length > 100 ? 1 : 0;
          return { article, score: eduScore + lengthBonus };
        });
        scored.sort((a, b) => b.score - a.score);
        return scored[0].article;
      }

      function generateCarousel(article) {
        const title = article.title || 'Crypto Update';
        const description = article.description || '';
        const fullText = description.trim();
        
        const sentences = fullText.match(/[^\.!\?]+[\.!\?]+/g) || [];
        const points = sentences.map(s => s.trim()).filter(s => s.length > 10);
        
        let hookHeadline = title.substring(0, 40);
        if (hookHeadline.length === 40) hookHeadline += '...';
        let subheadline = points.length ? points[0].substring(0, 80) : 'Breaking crypto news you need to know';
        if (subheadline.length === 80) subheadline += '...';
        
        const slides = [];
        slides.push({
          slide_number: 1,
          headline: hookHeadline,
          body_text: subheadline,
          image_prompt: `Dark futuristic crypto-themed visual: ${title.split(' ').slice(0,5).join(' ')}, glowing blue circuits, minimalist, glowing neon accents, 8k, cinematic`
        });
        
        for (let i = 0; i < points.length; i++) {
          if (slides.length >= 9) break;
          let fact = points[i];
          if (fact.length > 150) fact = fact.substring(0, 147) + '...';
          const takeaway = (i % 2 === 0) ? 'Key takeaway: This could reshape market dynamics.' : 'Why it matters: Stay informed to stay ahead.';
          slides.push({
            slide_number: slides.length + 1,
            headline: `Fact #${i+1}`,
            body_text: fact,
            image_prompt: `Dark futuristic crypto-themed visual: ${fact.split(' ').slice(0,5).join(' ')}, minimalist, glowing neon accents, 8k, cinematic`,
            takeaway: takeaway
          });
        }
        
        slides.forEach(s => {
          if (!s.takeaway && s.slide_number !== 1) {
            s.takeaway = 'Why it matters: Understanding this gives you an edge.';
          }
        });
        
        slides.push({
          slide_number: slides.length + 1,
          headline: 'Save this for later 📌',
          body_text: 'Follow @CryptoCarouselGPT for daily alpha',
          image_prompt: 'Dark futuristic crypto-themed visual: neon bookmark icon, minimalist, glowing neon accents, 8k, cinematic',
          takeaway: null
        });
        
        while (slides.length < 5) {
          const fact = points.length > slides.length-2 ? points[slides.length-2] : 'Stay updated with real-time crypto insights.';
          slides.splice(-1, 0, {
            slide_number: slides.length,
            headline: `Insight #${slides.length-1}`,
            body_text: fact.length > 150 ? fact.substring(0,147)+'...' : fact,
            image_prompt: `Dark futuristic crypto-themed visual: data analysis, minimalist, glowing neon accents, 8k, cinematic`,
            takeaway: 'Key takeaway: Knowledge is power in crypto.'
          });
        }
        
        slides.forEach((s, idx) => s.slide_number = idx + 1);
        
        let captionBase = `🚀 ${title.substring(0, 100)}... What do you think about this? Drop your thoughts below!`;
        if (captionBase.length > 180) captionBase = captionBase.substring(0, 177) + '...';
        
        const topicTags = [];
        const textLower = (title + ' ' + description).toLowerCase();
        if (textLower.includes('ethereum') || textLower.includes('eth')) topicTags.push('#ethereum');
        if (textLower.includes('bitcoin') || textLower.includes('btc')) topicTags.push('#bitcoin');
        if (textLower.includes('defi')) topicTags.push('#DeFi');
        if (textLower.includes('layer2') || textLower.includes('l2')) topicTags.push('#Layer2');
        if (textLower.includes('nft')) topicTags.push('#NFT');
        if (textLower.includes('solana')) topicTags.push('#Solana');
        if (textLower.includes('regulation') || textLower.includes('sec')) topicTags.push('#Regulation');
        const broadTags = ['#crypto', '#bitcoin', '#blockchain', '#cryptocurrency'];
        const communityTags = ['#cryptocommunity', '#cryptonews', '#web3', '#altcoins', '#cryptoeducation', '#CryptoCarouselGPT'];
        let allHashtags = [...broadTags, ...topicTags, ...communityTags];
        allHashtags = [...new Set(allHashtags)];
        while (allHashtags.length < 22) {
          const extras = ['#cryptoworld', '#hodl', '#defi', '#cryptotrading', '#cryptoinvestor', '#blockchaintechnology', '#smartcontracts'];
          const rand = extras[Math.floor(Math.random() * extras.length)];
          if (!allHashtags.includes(rand)) allHashtags.push(rand);
        }
        const hashtagsString = allHashtags.slice(0,25).join(' ');
        
        return {
          article: {
            title: article.title,
            source: (article.source && article.source.name) || 'Unknown',
            url: article.url || '#',
            publishedAt: article.publishedAt || new Date().toISOString()
          },
          carousel: slides,
          caption: captionBase,
          hashtags: hashtagsString
        };
      }

      function renderCarousel(data) {
        carouselData = data;
        currentSlide = 0;
        const { article, carousel, caption, hashtags } = data;
        
        let html = `
        <div class="carousel-card" id="carouselCard">
          <div class="card-header-bar">
            <div class="source-icon">CT</div>
            <div class="source-name">${escapeHtml(article.source)}</div>
            <span class="time-ago">${timeAgo(article.publishedAt)}</span>
            <i class="bi bi-three-dots" style="color: var(--text-muted);"></i>
          </div>
          <div class="slide-area position-relative swipe-area" id="slideArea">
            <div class="slide-container" id="slideContainer">
        `;
        
        carousel.forEach((slide, idx) => {
          html += `
            <div class="slide ${idx === 0 ? 'active' : ''}" data-index="${idx}">
              <span class="slide-number-pill">${slide.slide_number}/${carousel.length}</span>
              <div class="slide-headline">${escapeHtml(slide.headline)}</div>
              <div class="slide-body">${escapeHtml(slide.body_text)}</div>
              ${slide.takeaway ? `<div class="takeaway">${escapeHtml(slide.takeaway)}</div>` : ''}
              <div class="image-prompt-box">
                <i class="bi bi-image-alt me-1"></i> AI Image Prompt: ${escapeHtml(slide.image_prompt)}
              </div>
            </div>
          `;
        });
        
        html += `
            </div>
            <div class="nav-arrows">
              <button class="arrow-btn" id="prevSlide" aria-label="Previous slide"><i class="bi bi-chevron-left"></i></button>
              <button class="arrow-btn" id="nextSlide" aria-label="Next slide"><i class="bi bi-chevron-right"></i></button>
            </div>
          </div>
          <div class="dot-indicators" id="dotIndicators">
        `;
        
        carousel.forEach((_, idx) => {
          html += `<span class="dot ${idx === 0 ? 'active-dot' : ''}" data-dot="${idx}"></span>`;
        });
        
        html += `
          </div>
        </div>
        <div class="caption-section">
          <div class="caption-text">${escapeHtml(caption)}</div>
          <div class="hashtags">${escapeHtml(hashtags)}</div>
          <button class="copy-btn" id="copyJsonBtn"><i class="bi bi-clipboard me-1"></i> Copy JSON</button>
        </div>
        `;
        
        contentArea.innerHTML = html;
        
        document.getElementById('prevSlide')?.addEventListener('click', () => navigate(-1));
        document.getElementById('nextSlide')?.addEventListener('click', () => navigate(1));
        document.querySelectorAll('.dot').forEach(dot => {
          dot.addEventListener('click', (e) => {
            const index = parseInt(e.target.getAttribute('data-dot'));
            goToSlide(index);
          });
        });
        document.getElementById('copyJsonBtn')?.addEventListener('click', copyJsonToClipboard);
        
        const slideArea = document.getElementById('slideArea');
        if (slideArea) {
          let touchStartX = 0;
          slideArea.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
          }, { passive: true });
          slideArea.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 40) {
              if (diff > 0) navigate(1);
              else navigate(-1);
            }
          });
        }
        
        emptyState.style.display = 'none';
      }

      function navigate(direction) {
        if (!carouselData) return;
        const totalSlides = carouselData.carousel.length;
        let newIndex = currentSlide + direction;
        if (newIndex < 0) newIndex = totalSlides - 1;
        if (newIndex >= totalSlides) newIndex = 0;
        goToSlide(newIndex);
      }

      function goToSlide(index) {
        if (!carouselData) return;
        currentSlide = index;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        slides.forEach((s, i) => { s.classList.toggle('active', i === index); });
        dots.forEach((d, i) => { d.classList.toggle('active-dot', i === index); });
      }

      function copyJsonToClipboard() {
        if (!carouselData) return;
        navigator.clipboard.writeText(JSON.stringify(carouselData, null, 2))
          .then(() => showToast('✅ JSON copied to clipboard!', true))
          .catch(() => showToast('Failed to copy', false));
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function resetToEmpty() {
        contentArea.innerHTML = '';
        emptyState.style.display = 'block';
        loadingSkeleton.style.display = 'none';
        carouselData = null;
      }

      async function handleGenerate() {
        if (generateBtn.disabled) return;
        
        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> Generating…';
        emptyState.style.display = 'none';
        contentArea.innerHTML = '';
        loadingSkeleton.style.display = 'block';
        
        try {
          const articles = await fetchNews();
          if (!articles.length) throw new Error('No news articles received');
          
          const bestArticle = selectBestArticle(articles);
          const result = generateCarousel(bestArticle);
          
          loadingSkeleton.style.display = 'none';
          renderCarousel(result);
        } catch (error) {
          console.error(error);
          loadingSkeleton.style.display = 'none';
          generateBtn.classList.add('error-shake');
          showToast(`⚠️ ${error.message || 'Failed to fetch news. Try again later.'}`);
          setTimeout(() => { generateBtn.classList.remove('error-shake'); }, 500);
          resetToEmpty();
        } finally {
          generateBtn.disabled = false;
          generateBtn.innerHTML = '<i class="bi bi-stars"></i> Generate';
        }
      }

      generateBtn.addEventListener('click', handleGenerate);
      resetToEmpty();

    })();
  </script>
</body>
</html>
